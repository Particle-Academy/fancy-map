name: Publish to npm

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install
        run: npm install

      - name: Build
        run: npm run build

      # Pure OIDC / Trusted Publishing — no token. npm 11.5+ (via npx) is
      # required for OIDC; the runner's bundled npm 10 can't do it.
      - name: Publish
        run: npx -y npm@11.18.0 publish --provenance --access public
