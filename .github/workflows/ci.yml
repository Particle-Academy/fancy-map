name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege: CI only checks out + builds — read-only access is enough.
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install
        run: npm install
      - name: Lint (tsc)
        run: npm run lint
      - name: Build
        run: npm run build
